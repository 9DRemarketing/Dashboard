<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSM — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b47;
    --text: #f0f0f8;
    --text2: #8888aa;
    --text3: #555570;
    --green: #47ff9a;
    --red: #ff4747;
    --yellow: #ffcc47;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }
  .header-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    margin-right: 5px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 12px 20px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 1px 6px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
  }
  .tab.active .tab-badge { background: rgba(232,255,71,0.1); border-color: rgba(232,255,71,0.3); color: var(--accent); }

  /* CONTENT */
  .content { padding: 24px 28px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* KPI TABLEAUX */
  .kpi-block {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .kpi-tableau {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .kpi-tableau.highlight { border-color: rgba(232,255,71,0.25); }
  .kpi-tableau.tommy { border-color: rgba(71,200,255,0.25); }
  .kpi-tableau.normand { border-color: rgba(199,71,255,0.25); }
  .kpi-tableau.inventaire { border-color: rgba(71,255,154,0.2); }
  .kpi-tableau-header {
    padding: 8px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .kpi-tableau.highlight .kpi-tableau-header { background: rgba(232,255,71,0.06); color: var(--accent); }
  .kpi-tableau.tommy .kpi-tableau-header { background: rgba(71,200,255,0.06); color: var(--accent2); }
  .kpi-tableau.normand .kpi-tableau-header { background: rgba(199,71,255,0.06); color: #c847ff; }
  .kpi-tableau.inventaire .kpi-tableau-header { background: rgba(71,255,154,0.06); color: var(--green); }
  .kpi-ligne {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
  }
  .kpi-ligne:last-child { border-bottom: none; }
  .kpi-ligne.total-row { background: rgba(255,255,255,0.02); }
  .kpi-ligne-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .kpi-ligne-val {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .kpi-ligne-val.accent { color: var(--accent); }
  .kpi-ligne-val.green { color: var(--green); }
  .kpi-ligne-val.red { color: var(--red); }
  .kpi-ligne-val.blue { color: var(--accent2); }
  .kpi-ligne-val.purple { color: #c847ff; }
  .kpi-ligne-val.yellow { color: var(--yellow); }
  .kpi-ligne-val.big { font-size: 20px; }
  .tag-tommy { background: rgba(71,200,255,0.15); color: var(--accent2); padding: 1px 6px; border-radius: 3px; font-size: 9px; font-family: 'DM Mono', monospace; }
  .tag-normand { background: rgba(199,71,255,0.15); color: #c847ff; padding: 1px 6px; border-radius: 3px; font-size: 9px; font-family: 'DM Mono', monospace; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    margin-top: 20px;
  }
  .section-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  /* SEARCH */
  .search-bar {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar::placeholder { color: var(--text3); }
  .search-bar:focus { border-color: var(--accent); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .table-section-label {
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .table-section-label .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    background: var(--surface2);
  }
  td {
    padding: 9px 12px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .stock-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
  }
  .vehicle-name {
    font-weight: 500;
    font-size: 12px;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-hl { background: rgba(71,200,255,0.12); color: var(--accent2); border: 1px solid rgba(71,200,255,0.25); }
  .badge-st { background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); }
  .badge-prb { background: rgba(255,204,71,0.1); color: var(--yellow); border: 1px solid rgba(255,204,71,0.2); }
  .badge-acc { background: rgba(71,255,154,0.1); color: var(--green); border: 1px solid rgba(71,255,154,0.2); }
  .badge-rel { background: rgba(255,107,71,0.1); color: var(--accent3); border: 1px solid rgba(255,107,71,0.2); }
  .badge-default { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .profit-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 11px; }
  .profit-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 11px; }
  .profit-zero { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; }
  .cost-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }
  .notes-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text3); font-size: 11px; }

  /* LOADING / ERROR */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .loading-spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: var(--red); text-align: center; padding: 40px; font-family: 'DM Mono', monospace; font-size: 11px; }

  /* OFFERS TABLE */
  .offer-client { font-weight: 500; font-size: 12px; color: var(--accent2); }
  .diff-pos { color: var(--green); font-family: 'DM Mono', monospace; font-size: 11px; }
  .diff-neg { color: var(--red); font-family: 'DM Mono', monospace; font-size: 11px; }
  .date-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .km-cell { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); }

  /* EMPTY STATE */
  .empty { padding: 30px; text-align: center; color: var(--text3); font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">BSM<span>.</span></div>
  <div class="header-meta">
    <span><span class="status-dot"></span>Live</span>
    <span id="last-update">—</span>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('cdn')">🇨🇦 Inventaire CDN <span class="tab-badge" id="badge-cdn">—</span></div>
  <div class="tab" onclick="switchTab('us')">🇺🇸 Inventaire US <span class="tab-badge" id="badge-us">—</span></div>
  <div class="tab" onclick="switchTab('offers')">💼 Buyers Offers <span class="tab-badge" id="badge-offers">—</span></div>
</div>

<div class="content">

  <!-- CDN TAB -->
  <div class="tab-panel active" id="panel-cdn">
    <div class="kpi-block" id="kpi-cdn"></div>
    <input class="search-bar" type="text" placeholder="Rechercher stock, véhicule, fournisseur..." oninput="filterTable('cdn-table', this.value)">
    <div id="cdn-table"><div class="loading"><div class="loading-spinner"></div>Chargement...</div></div>
  </div>

  <!-- US TAB -->
  <div class="tab-panel" id="panel-us">
    <div class="kpi-row" id="kpi-us"></div>
    <input class="search-bar" type="text" placeholder="Rechercher stock, véhicule, client..." oninput="filterTable('us-table', this.value)">
    <div id="us-table"><div class="loading"><div class="loading-spinner"></div>Chargement...</div></div>
  </div>

  <!-- OFFERS TAB -->
  <div class="tab-panel" id="panel-offers">
    <div class="kpi-row" id="kpi-offers"></div>
    <input class="search-bar" type="text" placeholder="Rechercher stock, véhicule, client..." oninput="filterTable('offers-table', this.value)">
    <div id="offers-table"><div class="loading"><div class="loading-spinner"></div>Chargement...</div></div>
  </div>

</div>

<script>
const SHEET_ID = '1jI5oWWijJ2lAP38YY240ZmIwX02t8CByYooDX3fMJrY';
const GIDS = { cdn: '1663886144', us: '709858597', offers: '195781356' };

function csvUrl(gid) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
}

async function fetchCSV(gid) {
  const r = await fetch(csvUrl(gid));
  if (!r.ok) throw new Error('Fetch failed');
  return r.text();
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  return lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += line[i]; }
    }
    cols.push(cur.trim());
    return cols;
  });
}

function parseNum(s) {
  if (!s) return 0;
  return parseFloat(s.replace(/[$,\s]/g, '')) || 0;
}

function fmtCAD(n) {
  if (isNaN(n) || n === 0) return '—';
  return '$' + Math.round(n).toLocaleString('fr-CA');
}

function fmtUSD(n) {
  if (isNaN(n) || n === 0) return '—';
  return 'US$' + Math.round(n).toLocaleString('en-US');
}

function statusBadge(s) {
  if (!s || s === '—') return '';
  const map = { HL: 'badge-hl', ST: 'badge-st', PRB: 'badge-prb', ACC: 'badge-acc', REL: 'badge-rel' };
  const cls = map[s.toUpperCase()] || 'badge-default';
  return `<span class="badge ${cls}">${s}</span>`;
}

function profitCell(n) {
  if (n === 0 || isNaN(n)) return `<span class="profit-zero">—</span>`;
  if (n > 0) return `<span class="profit-pos">+${fmtCAD(n)}</span>`;
  return `<span class="profit-neg">${fmtCAD(n)}</span>`;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['cdn','us','offers'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function filterTable(containerId, query) {
  const q = query.toLowerCase();
  const container = document.getElementById(containerId);
  const rows = container.querySelectorAll('tr.data-row');
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// ─── CDN ────────────────────────────────────────────────────────────
async function loadCDN() {
  try {
    const text = await fetchCSV(GIDS.cdn);
    const rows = parseCSV(text);

    // Parse portfolio summary — positions fixes dans le Google Sheet
    // Row 1 (index 0) = ligne 1 du CSV = ligne 1 du sheet
    // C2 = col index 2, row index 1
    let portefeuilleAlloue = 0, portefeuilleReel = 0, portefeuilleProj = 0, disponible = 0, disponibleProj = 0;
    let tommyReel = 0, tommyProj = 0;
    let normandReel = 0, normandProj = 0;
    let advanceSignal = 0;
    let tommyCount = 0, normandCount = 0, detailCount = 0, ontarioCount = 0;
    let inventaireTotal = 0;

    // Lire toutes les 10 premières lignes pour trouver les valeurs
    for (let i = 0; i < 10; i++) {
      const r = rows[i] || [];
      const joined = r.join('|').toLowerCase();

      if (joined.includes('portfeuille alloué') || joined.includes('portefeuille alloué')) portefeuilleAlloue = parseNum(r[2]);
      if (joined.includes('portefeuille réel') && !joined.includes('tommy') && !joined.includes('normand')) portefeuilleReel = parseNum(r[2]);
      if (joined.includes('portefeuille projeté') || joined.includes('portefeuille projett')) portefeuilleProj = parseNum(r[6]);
      if (joined.includes('disponible réel') && !joined.includes('projeté')) disponible = parseNum(r[2]);
      if (joined.includes('disponible projeté') || joined.includes('disponible projett')) disponibleProj = parseNum(r[6]);
      if (joined.includes('tommy réel') || joined.includes('tommy reel')) tommyReel = parseNum(r[2]);
      if (joined.includes('tommy projetté') || joined.includes('tommy projeté') || joined.includes('tommy projett')) tommyProj = parseNum(r[6]);
      if (joined.includes('normand réel') || joined.includes('normand reel')) normandReel = parseNum(r[2]);
      if (joined.includes('normand projetté') || joined.includes('normand projeté') || joined.includes('normand projett')) normandProj = parseNum(r[6]);
      if (joined.includes('advance signal')) advanceSignal = parseNum(r[2]);

      for (let c = 0; c < r.length; c++) {
        const cell = (r[c] || '').toUpperCase().trim();
        if (cell === 'TOMMY') tommyCount = parseNum(r[c+1]) || tommyCount;
        if (cell === 'NORMAND') normandCount = parseNum(r[c+1]) || normandCount;
        if (cell === 'DÉTAIL' || cell === 'DETAIL') detailCount = parseNum(r[c+1]);
        if (cell === 'ONTARIO') ontarioCount = parseNum(r[c+1]) || ontarioCount;
      }
      if (r[11] && parseNum(r[11]) > 50) inventaireTotal = parseNum(r[11]);
      if (r[12] && parseNum(r[12]) > 50) inventaireTotal = parseNum(r[12]);
    }

    // Fallback positions fixes
    if (portefeuilleReel === 0 && rows[1] && rows[1][2]) portefeuilleReel = parseNum(rows[1][2]);
    if (tommyProj === 0 && rows[2] && rows[2][6]) tommyProj = parseNum(rows[2][6]);
    if (normandProj === 0 && rows[3] && rows[3][6]) normandProj = parseNum(rows[3][6]);

    // Find all data rows (stock numbers starting with B)
    const vehicles = [];
    let currentSection = '';
    const sectionColors = {
      'NOUVEAUX ARRIVAGES': '#e8ff47',
      'EN PRÉPARATION': '#47c8ff',
      'PRÊT': '#47ff9a',
      'IN TRANSIT BMA': '#ff6b47',
      'WHOLESALE*ENCAN LOCALE': '#ffcc47',
      'WS ONTARIO': '#c847ff',
    };

    for (const row of rows) {
      if (!row[0] && row[1] && !row[1].startsWith('#') && row[2] !== 'VIN') {
        const label = row[1].toUpperCase().replace(/LOAD SPEEDO.*/, 'LOAD SPEEDO');
        if (!label.match(/^\$/) && !label.match(/^PORTEFEUILLE/) && !label.match(/^TOMMY/) && !label.match(/^NORMAND/) && !label.match(/^ADVANCE/) && !label.match(/^AJOUT/) && !label.match(/^DISPONIBLE/) && !label.match(/^NOUVEAUX ARRIVAGES/) && !label.match(/^EN PRÉPARATION/) && !label.match(/^PRÊT/) && !label.match(/^IN TRANSIT/) && !label.match(/^WHOLESALE/) && !label.match(/^WS ONTARIO/)) {
          // might be section
        }
        // Detect section labels
        const secLabels = ['NOUVEAUX ARRIVAGES','EN PRÉPARATION','PRÊT','IN TRANSIT BMA','WHOLESALE','WS ONTARIO'];
        for (const sl of secLabels) {
          if (row[1] && row[1].toUpperCase().includes(sl.split('*')[0])) {
            currentSection = sl; break;
          }
        }
        if (row[1] && row[1].toUpperCase().startsWith('LOAD SPEEDO')) {
          currentSection = row[1].toUpperCase();
        }
      }
      if (row[0] && row[0].startsWith('B') && row[1] && !row[1].startsWith('#')) {
        vehicles.push({
          stock: row[0], vehicule: row[1], vin: row[2], annee: row[3],
          couleur: row[4], km: row[5], location: row[6], notes: row[7],
          costCad: parseNum(row[17]), profitCad: parseNum(row[18]),
          statut: row[19] || '', section: currentSection,
          fournisseur: row[14] || '', client: row[15] || '', acheteur: row[16] || ''
        });
      }
    }

    // KPIs — 4 tableaux côte à côte
    const kpiEl = document.getElementById('kpi-cdn');

    const dispReelClass = disponible >= 0 ? 'green' : 'red';
    const avanceClass = 'yellow';

    kpiEl.innerHTML = `
      <!-- TABLEAU 1 : PORTEFEUILLE -->
      <div class="kpi-tableau highlight">
        <div class="kpi-tableau-header">Portefeuille</div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Alloué</span>
          <span class="kpi-ligne-val accent">${fmtCAD(portefeuilleAlloue)}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Projeté</span>
          <span class="kpi-ligne-val blue">${fmtCAD(portefeuilleProj)}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Réel</span>
          <span class="kpi-ligne-val">${fmtCAD(portefeuilleReel)}</span>
        </div>
        <div class="kpi-ligne">

          <span class="kpi-ligne-label">Réel</span>
          <span class="kpi-ligne-val">${fmtCAD(tommyReel)}</span>

        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Alloué</span>
          <span class="kpi-ligne-val purple">$750 000</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Projeté</span>
          <span class="kpi-ligne-val purple">${fmtCAD(normandProj)}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Réel</span>
          <span class="kpi-ligne-val">${fmtCAD(normandReel)}</span>
        </div>
      </div>

      <!-- TABLEAU 4 : INVENTAIRE -->
      <div class="kpi-tableau inventaire">
        <div class="kpi-tableau-header">Inventaire</div>
        <div class="kpi-ligne total-row">
          <span class="kpi-ligne-label">Total</span>
          <span class="kpi-ligne-val green big">${inventaireTotal || (tommyCount + normandCount + detailCount + ontarioCount)}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label"><span class="tag-tommy">TOMMY</span></span>
          <span class="kpi-ligne-val blue">${tommyCount}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label"><span class="tag-normand">NORMAND</span></span>
          <span class="kpi-ligne-val purple">${normandCount}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Détail</span>
          <span class="kpi-ligne-val">${detailCount}</span>
        </div>
        <div class="kpi-ligne">
          <span class="kpi-ligne-label">Ontario</span>
          <span class="kpi-ligne-val yellow">${ontarioCount}</span>

    document.getElementById('badge-cdn').textContent = vehicles.length;

    // Group by section
    const sections = {};
    for (const v of vehicles) {
      const sec = v.section || 'AUTRE';
      if (!sections[sec]) sections[sec] = [];
      sections[sec].push(v);
    }

    let html = '';
    const secOrder = ['NOUVEAUX ARRIVAGES','EN PRÉPARATION','PRÊT','IN TRANSIT BMA','WHOLESALE*ENCAN LOCALE','WS ONTARIO'];
    const allSecs = [...secOrder, ...Object.keys(sections).filter(s => !secOrder.includes(s))];

    for (const sec of allSecs) {
      if (!sections[sec] || sections[sec].length === 0) continue;
      const dotColor = sectionColors[sec] || '#8888aa';
      html += `
        <div class="table-wrap">
          <div class="table-section-label">
            <span class="dot" style="background:${dotColor}"></span>
            ${sec} <span style="color:var(--text3);margin-left:8px">${sections[sec].length} unité${sections[sec].length > 1 ? 's' : ''}</span>
          </div>
          <table>
            <thead><tr>
              <th>Stock</th><th>Véhicule</th><th>Année</th><th>Couleur</th><th>KM</th>
              <th>Location</th><th>Cost CAD</th><th>Statut</th><th>Notes</th>
            </tr></thead>
            <tbody>
      `;
      for (const v of sections[sec]) {
        html += `<tr class="data-row">
          <td><span class="stock-num">${v.stock}</span></td>
          <td><span class="vehicle-name">${v.vehicule}</span></td>
          <td class="cost-val">${v.annee}</td>
          <td class="cost-val">${v.couleur}</td>
          <td class="km-cell">${v.km ? Number(v.km).toLocaleString('fr-CA') + ' km' : '—'}</td>
          <td class="cost-val">${v.location || '—'}</td>
          <td class="cost-val">${v.costCad ? fmtCAD(v.costCad) : '—'}</td>
          <td>${statusBadge(v.statut)}</td>
          <td><span class="notes-cell" title="${v.notes}">${v.notes || '—'}</span></td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    }

    document.getElementById('cdn-table').innerHTML = html || '<div class="empty">Aucune donnée</div>';
  } catch(e) {
    document.getElementById('cdn-table').innerHTML = `<div class="error">Erreur de chargement. Vérifier que le Google Sheet est public.<br><small>${e.message}</small></div>`;
  }
}

// ─── US ─────────────────────────────────────────────────────────────
async function loadUS() {
  try {
    const text = await fetchCSV(GIDS.us);
    const rows = parseCSV(text);

    const vehicles = [];
    let currentSection = '';

    for (const row of rows) {
      if (!row[0] && row[1] && !row[1].startsWith('#') && row[1] !== 'VÉHICULE') {
        const secs = ['AT SPEEDO','AT SIGNAL','AT DIV','STRATTON'];
        for (const sl of secs) {
          if (row[1].toUpperCase().includes(sl)) { currentSection = sl; break; }
        }
      }
      if (row[0] && row[0].startsWith('B') && row[1] && !row[1].startsWith('#')) {
        vehicles.push({
          stock: row[0], vehicule: row[1], vin: row[2], annee: row[3],
          couleur: row[4], km: row[5], notes: row[6],
          arrival: row[7], submit: row[8], release: row[9], sold: row[10],
          client: row[13] || '', acheteur: row[14] || '',
          costUsd: parseNum(row[15]), costCad: parseNum(row[16]),
          sellCad: parseNum(row[17]), profitCad: parseNum(row[18]),
          statut: row[21] || '', section: currentSection
        });
      }
    }

    // KPIs
    const totalCostCad = vehicles.reduce((s, v) => s + v.costCad, 0);
    const totalProfitCad = vehicles.filter(v => v.profitCad !== 0).reduce((s, v) => s + v.profitCad, 0);
    const sold = vehicles.filter(v => v.sold && v.sold.trim()).length;

    document.getElementById('kpi-us').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">Total Véhicules US</div><div class="kpi-value">${vehicles.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Coût Total CAD</div><div class="kpi-value accent">${fmtCAD(totalCostCad)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Profit Total CAD</div><div class="kpi-value ${totalProfitCad >= 0 ? 'green' : 'red'}">${fmtCAD(totalProfitCad)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Vendus</div><div class="kpi-value blue">${sold}</div></div>
    `;

    document.getElementById('badge-us').textContent = vehicles.length;

    const sections = {};
    for (const v of vehicles) {
      const sec = v.section || 'AUTRE';
      if (!sections[sec]) sections[sec] = [];
      sections[sec].push(v);
    }

    const sectionColors = { 'AT SPEEDO': '#e8ff47', 'AT SIGNAL': '#47c8ff', 'AT DIV': '#ff6b47', 'STRATTON': '#47ff9a' };
    let html = '';

    for (const sec of ['AT SPEEDO','AT SIGNAL','AT DIV','STRATTON','AUTRE']) {
      if (!sections[sec] || sections[sec].length === 0) continue;
      const dotColor = sectionColors[sec] || '#8888aa';
      html += `
        <div class="table-wrap">
          <div class="table-section-label">
            <span class="dot" style="background:${dotColor}"></span>
            ${sec} <span style="color:var(--text3);margin-left:8px">${sections[sec].length} unité${sections[sec].length > 1 ? 's' : ''}</span>
          </div>
          <table>
            <thead><tr>
              <th>Stock</th><th>Véhicule</th><th>Année</th><th>KM</th>
              <th>Client</th><th>Cost USD</th><th>Cost CAD</th><th>Sell CAD</th><th>Profit</th><th>Statut</th><th>Notes</th>
            </tr></thead>
            <tbody>
      `;
      for (const v of sections[sec]) {
        html += `<tr class="data-row">
          <td><span class="stock-num">${v.stock}</span></td>
          <td><span class="vehicle-name">${v.vehicule}</span></td>
          <td class="cost-val">${v.annee}</td>
          <td class="km-cell">${v.km ? Number(v.km).toLocaleString('fr-CA') + ' km' : '—'}</td>
          <td><span class="offer-client">${v.client || '—'}</span></td>
          <td class="cost-val">${v.costUsd ? fmtUSD(v.costUsd) : '—'}</td>
          <td class="cost-val">${v.costCad ? fmtCAD(v.costCad) : '—'}</td>
          <td class="cost-val">${v.sellCad ? fmtCAD(v.sellCad) : '—'}</td>
          <td>${profitCell(v.profitCad)}</td>
          <td>${statusBadge(v.statut)}</td>
          <td><span class="notes-cell" title="${v.notes}">${v.notes || '—'}</span></td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
    }

    document.getElementById('us-table').innerHTML = html || '<div class="empty">Aucune donnée</div>';
  } catch(e) {
    document.getElementById('us-table').innerHTML = `<div class="error">Erreur de chargement.<br><small>${e.message}</small></div>`;
  }
}

// ─── OFFERS ─────────────────────────────────────────────────────────
async function loadOffers() {
  try {
    const text = await fetchCSV(GIDS.offers);
    const rows = parseCSV(text);

    const offers = [];
    let headerFound = false;

    for (const row of rows) {
      if (row[0] === 'STOCK' && row[1] === 'VÉHICULE') { headerFound = true; continue; }
      if (!headerFound) continue;
      if (!row[0] || row[0].startsWith('#') || !row[0].startsWith('B')) continue;
      offers.push({
        stock: row[0], vehicule: row[1], vin: row[2], annee: row[3],
        km: parseNum(row[4]), date: row[5] || '',
        costCad: parseNum(row[6]), costUsd: parseNum(row[7]),
        mmr: parseNum(row[8]), diff: parseNum(row[9]),
        client: row[10] || '', prixDemande: parseNum(row[11]),
        offreUsd: parseNum(row[12]), offreCad: parseNum(row[13]),
        profit: parseNum(row[16]), notes: row[17] || '', acheteur: row[18] || ''
      });
    }

    const totalProfit = offers.reduce((s, o) => s + o.profit, 0);
    const profitOffers = offers.filter(o => o.profit > 0);
    const avgProfit = profitOffers.length ? totalProfit / profitOffers.length : 0;

    document.getElementById('kpi-offers').innerHTML = `
      <div class="kpi-card"><div class="kpi-label">Total Offres</div><div class="kpi-value">${offers.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Profit Total CAD</div><div class="kpi-value ${totalProfit >= 0 ? 'green' : 'red'}">${fmtCAD(totalProfit)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Profit Moyen</div><div class="kpi-value blue">${fmtCAD(avgProfit)}</div></div>
      <div class="kpi-card"><div class="kpi-label">Offres Positives</div><div class="kpi-value accent">${profitOffers.length}</div></div>
    `;

    document.getElementById('badge-offers').textContent = offers.length;

    let html = `<div class="table-wrap"><table>
      <thead><tr>
        <th>Stock</th><th>Véhicule</th><th>Année</th><th>KM</th><th>Date</th>
        <th>Client</th><th>Cost CAD</th><th>MMR</th><th>Offre USD</th><th>Offre CAD</th><th>Profit</th><th>Notes</th>
      </tr></thead><tbody>`;

    for (const o of offers) {
      html += `<tr class="data-row">
        <td><span class="stock-num">${o.stock}</span></td>
        <td><span class="vehicle-name">${o.vehicule}</span></td>
        <td class="cost-val">${o.annee}</td>
        <td class="km-cell">${o.km ? o.km.toLocaleString('fr-CA') + ' km' : '—'}</td>
        <td class="date-cell">${o.date}</td>
        <td><span class="offer-client">${o.client}</span></td>
        <td class="cost-val">${fmtCAD(o.costCad)}</td>
        <td class="cost-val">${fmtCAD(o.mmr)}</td>
        <td class="cost-val">${fmtUSD(o.offreUsd)}</td>
        <td class="cost-val">${fmtCAD(o.offreCad)}</td>
        <td>${profitCell(o.profit)}</td>
        <td><span class="notes-cell" title="${o.notes}">${o.notes || '—'}</span></td>
      </tr>`;
    }

    html += `</tbody></table></div>`;
    document.getElementById('offers-table').innerHTML = html;
  } catch(e) {
    document.getElementById('offers-table').innerHTML = `<div class="error">Erreur de chargement.<br><small>${e.message}</small></div>`;
  }
}

async function loadAll() {
  document.getElementById('last-update').textContent = 'Chargement...';
  await Promise.all([loadCDN(), loadUS(), loadOffers()]);
  const now = new Date();
  document.getElementById('last-update').textContent = now.toLocaleTimeString('fr-CA', {hour:'2-digit', minute:'2-digit'});
}

loadAll();
</script>
